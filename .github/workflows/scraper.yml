name: PoE2 Economy Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Fallback safety net: triggers every 6 hours in case self-trigger fails
  workflow_dispatch: # Enable manual run trigger from the actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Allow up to 6 hours
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }} # Use PAT so git push works inside the loop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Scraper Loop (5h 45m)
        run: |
          START=$(date +%s)
          DURATION=20700  # 5 hours 45 minutes
          INTERVAL=300    # check every 5 minutes
          END=$((START + DURATION))

          LAST_DETAILS_RUN=0
          DETAILS_INTERVAL=3600 # Run details fetcher once every hour

          while [ $(date +%s) -lt $END ]; do
            NOW=$(date +%s)
            echo ""
            echo "--- Scraper Tick: $(date -u +%Y-%m-%dT%H:%M:%SZ) ---"
            python scripts/poeninja_scraper.py

            # Run details fetcher hourly
            if [ $((NOW - LAST_DETAILS_RUN)) -ge $DETAILS_INTERVAL ]; then
              echo "[Scraper] Running details fetcher (hourly update)..."
              python scripts/fetch_all_details.py
              LAST_DETAILS_RUN=$(date +%s)
            fi

            # Push immediately after each tick if anything changed
            git add data/
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update database snapshots" && git push)

            REMAINING=$((END - $(date +%s)))
            if [ $REMAINING -gt $INTERVAL ]; then
              echo "[Scraper] Sleeping ${INTERVAL}s until next check... (${REMAINING}s remaining in this run)"
              sleep $INTERVAL
            else
              echo "[Scraper] Less than ${INTERVAL}s remaining. Finishing this run."
              break
            fi
          done
          echo "[Scraper] 5h 45m lifecycle complete."

      - name: Trigger next run
        run: |
          echo "[Scraper] Triggering next run via API..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Ironcock/PoTrade/actions/workflows/scraper.yml/dispatches \
            -d '{"ref":"main"}'
          echo "[Scraper] Next run triggered. Exiting."
