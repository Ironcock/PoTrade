name: PoE2 Economy Scraper

on:
  workflow_dispatch: # Enabled via cron-job.org trigger or manual trigger

permissions:
  contents: write
  actions: read # Needed to query the workflow runs API to check for running instances

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Allow up to 6 hours
    steps:
      - name: Check for active runs
        id: check_active
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTIVE_RUNS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/Ironcock/PoTrade/actions/workflows/scraper.yml/runs?status=in_progress" \
            | jq --arg current_id "${{ github.run_id }}" '.workflow_runs | map(select(.id != ($current_id | tonumber))) | length')
          
          echo "Found $ACTIVE_RUNS other active run(s)."
          if [ "$ACTIVE_RUNS" -gt 0 ]; then
            echo "duplicate=true" >> $GITHUB_OUTPUT
            echo "Another scraper instance is already running. Skipping execution."
          else
            echo "duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check_active.outputs.duplicate != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        if: steps.check_active.outputs.duplicate != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git
        if: steps.check_active.outputs.duplicate != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Scraper Loop (5h 45m)
        if: steps.check_active.outputs.duplicate != 'true'
        run: |
          START=$(date +%s)
          DURATION=20700  # 5 hours 45 minutes
          INTERVAL=300    # check every 5 minutes
          END=$((START + DURATION))

          while [ $(date +%s) -lt $END ]; do
            echo ""
            echo "--- Scraper Tick: $(date -u +%Y-%m-%dT%H:%M:%SZ) ---"
            python -u scripts/poeninja_scraper.py --all-leagues

            # Push immediately after each tick if anything changed
            git add data/
            git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update database snapshots" && git pull --rebase -X theirs && git push)

            REMAINING=$((END - $(date +%s)))
            if [ $REMAINING -gt $INTERVAL ]; then
              echo "[Scraper] Sleeping ${INTERVAL}s until next check... (${REMAINING}s remaining in this run)"
              sleep $INTERVAL
            else
              echo "[Scraper] Less than ${INTERVAL}s remaining. Finishing this run."
              break
            fi
          done
          echo "[Scraper] 5h 45m lifecycle complete."
